syntax = "proto3";

package cost.v1.agent;

option go_package = "github.com/kube-cost/kube-cost/proto/gen/go/cost/v1/agent;agentv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AgentIngestionService {
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc StreamObservations(stream ObservationBatch) returns (stream BatchAck);
  rpc ReportInventorySnapshot(stream InventorySnapshotChunk) returns (InventorySnapshotAck);
  rpc ReportHealth(HealthReport) returns (google.protobuf.Empty);
}

message OpenSessionRequest {
  string tenant_id = 1;
  string cluster_id = 2;
  string agent_version = 3;
  repeated string capabilities = 4;
}

message OpenSessionResponse {
  string session_id = 1;
  repeated string accepted_schema_versions = 2;
  uint64 max_batch_bytes = 3;
  string configuration_revision = 4;
}

message ObservationEnvelope {
  string event_id = 1;
  string type = 2;
  google.protobuf.Timestamp observed_at = 3;
  bytes payload = 4;
}

message ObservationBatch {
  string session_id = 1;
  string cluster_id = 2;
  uint64 first_sequence = 3;
  uint64 last_sequence = 4;
  string compression = 5;
  string schema_version = 6;
  bytes checksum = 7;
  repeated ObservationEnvelope observations = 8;
}

message Rejection {
  uint64 sequence = 1;
  string code = 2;
  string detail = 3;
  bool retryable = 4;
}

message BatchAck {
  uint64 highest_contiguous_sequence = 1;
  repeated Rejection rejections = 2;
}

message InventorySnapshotChunk {
  string snapshot_id = 1;
  uint32 chunk_index = 2;
  uint32 chunk_count = 3;
  bytes payload = 4;
  bytes checksum = 5;
}

message InventorySnapshotAck {
  string snapshot_id = 1;
  bool accepted = 2;
}

message HealthReport {
  string cluster_id = 1;
  google.protobuf.Timestamp observed_at = 2;
  uint64 wal_bytes = 3;
  uint64 oldest_unacknowledged_sequence = 4;
  repeated SourceHealth sources = 5;
}

message SourceHealth {
  string source = 1;
  string status = 2;
  string detail = 3;
}
