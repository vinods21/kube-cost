apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-cost-agent.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kube-cost-agent.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kube-cost-agent.fullname" . }}
        app.kubernetes.io/part-of: kube-cost
    spec:
      serviceAccountName: {{ include "kube-cost-agent.fullname" . }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: LEADER_ELECTION_ID
              value: {{ printf "%s.%s" (include "kube-cost-agent.fullname" .) .Release.Namespace | quote }}
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
