image:
  repository: kube-cost/agent
  tag: dev
  pullPolicy: IfNotPresent

agent:
  tenantId: local
  clusterId: kube-cost
  ingestionEndpoint: kube-cost-platform-ingestion.kube-cost-system.svc:8080
  insecureGRPC: true

resources:
  requests:
    cpu: 25m
    memory: 48Mi
  limits:
    cpu: 150m
    memory: 192Mi
