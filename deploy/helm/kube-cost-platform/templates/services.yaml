{{- range .Values.components }}
{{- $componentName := printf "%s-%s" $.Release.Name .name | trunc 63 | trimSuffix "-" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $componentName }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-cost
spec:
  replicas: {{ default 1 .replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/part-of: kube-cost
    spec:
      serviceAccountName: {{ include "kube-cost-platform.name" $ }}
      {{ if $.Values.priorityClassName }}
      priorityClassName: {{ $.Values.priorityClassName | quote }}
      {{ end }}
      securityContext:
        runAsNonRoot: true
      {{ if $.Values.topologySpread.enabled }}
      topologySpreadConstraints:
        - maxSkew: {{ $.Values.topologySpread.maxSkew }}
          topologyKey: {{ $.Values.topologySpread.topologyKey | quote }}
          whenUnsatisfiable: {{ $.Values.topologySpread.whenUnsatisfiable | quote }}
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ .name }}
              app.kubernetes.io/instance: {{ $.Release.Name }}
      {{ end }}
      containers:
        - name: {{ .name }}
          image: {{ .image | quote }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            {{ if or (eq .name "gateway") (eq .name "allocation") (eq .name "cluster-registry") (eq .name "pricing") (eq .name "query") (eq .name "workflow") (and (eq .name "integrations") $.Values.integrations.karpenter.enabled) }}
            - name: http
              containerPort: 8080
            {{ else }}
            - name: grpc
              containerPort: 8080
            {{ end }}
            {{ if eq .name "ingestion" }}
            - name: health
              containerPort: 8081
            {{ end }}
          env:
            {{ if eq .name "gateway" }}
            - name: GATEWAY_HTTP_ADDRESS
              value: ":8080"
            - name: GATEWAY_TOKEN_TENANTS
              value: {{ $.Values.gateway.tokenTenants | quote }}
            - name: QUERY_URL
              value: {{ default (printf "http://%s-query:8080" $.Release.Name) $.Values.gateway.queryURL | quote }}
            - name: CLUSTER_REGISTRY_URL
              value: {{ default (printf "http://%s-cluster-registry:8080" $.Release.Name) $.Values.gateway.clusterRegistryURL | quote }}
            - name: PRICING_URL
              value: {{ default (printf "http://%s-pricing:8080" $.Release.Name) $.Values.gateway.pricingURL | quote }}
            - name: WORKFLOW_URL
              value: {{ default (printf "http://%s-workflow:8080" $.Release.Name) $.Values.gateway.workflowURL | quote }}
            {{ else if eq .name "cluster-registry" }}
            - name: CLUSTER_REGISTRY_HTTP_ADDRESS
              value: ":8080"
            {{ else if eq .name "query" }}
            - name: QUERY_HTTP_ADDRESS
              value: ":8080"
            - name: CLICKHOUSE_ADDRESS
              value: {{ $.Values.query.clickhouse.address | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ $.Values.query.clickhouse.database | quote }}
            - name: CLICKHOUSE_USERNAME
              value: {{ $.Values.query.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ $.Values.query.clickhouse.password | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ $.Values.query.clickhouse.secure | quote }}
            {{ else if eq .name "pricing" }}
            - name: PRICING_HTTP_ADDRESS
              value: ":8080"
            - name: CLICKHOUSE_ADDRESS
              value: {{ $.Values.pricing.clickhouse.address | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ $.Values.pricing.clickhouse.database | quote }}
            - name: CLICKHOUSE_USERNAME
              value: {{ $.Values.pricing.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ $.Values.pricing.clickhouse.password | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ $.Values.pricing.clickhouse.secure | quote }}
            {{ else if eq .name "workflow" }}
            - name: WORKFLOW_HTTP_ADDRESS
              value: ":8080"
            - name: CLICKHOUSE_ADDRESS
              value: {{ $.Values.workflow.clickhouse.address | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ $.Values.workflow.clickhouse.database | quote }}
            - name: CLICKHOUSE_USERNAME
              value: {{ $.Values.workflow.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ $.Values.workflow.clickhouse.password | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ $.Values.workflow.clickhouse.secure | quote }}
            {{ else if eq .name "allocation" }}
            - name: HTTP_ADDRESS
              value: ":8080"
            - name: ALLOCATION_NODE_HOURLY_COST_USD
              value: {{ $.Values.allocation.nodeHourlyCostUSD | quote }}
            - name: ALLOCATION_CONTROL_PLANE_HOURLY_COST_USD
              value: {{ $.Values.allocation.controlPlaneHourlyCostUSD | quote }}
            - name: ALLOCATION_NETWORK_COST_PER_GIB_USD
              value: {{ $.Values.allocation.networkCostPerGiBUSD | quote }}
            - name: CLICKHOUSE_ADDRESS
              value: {{ $.Values.allocation.clickhouse.address | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ $.Values.allocation.clickhouse.database | quote }}
            - name: CLICKHOUSE_USERNAME
              value: {{ $.Values.allocation.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ $.Values.allocation.clickhouse.password | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ $.Values.allocation.clickhouse.secure | quote }}
            {{ else if and (eq .name "integrations") $.Values.integrations.karpenter.enabled }}
            - name: KARPENTER_HTTP_ADDRESS
              value: {{ $.Values.integrations.karpenter.httpAddress | quote }}
            - name: CLUSTER_ID
              value: {{ $.Values.integrations.karpenter.clusterId | quote }}
            {{ else }}
            - name: GRPC_ADDRESS
              value: ":8080"
            {{ end }}
            {{ if eq .name "ingestion" }}
            - name: HEALTH_ADDRESS
              value: ":8081"
            - name: INGESTION_INSECURE
              value: {{ $.Values.ingestion.insecure | quote }}
            - name: INGESTION_QUEUE_CAPACITY
              value: {{ $.Values.ingestion.queueCapacity | quote }}
            - name: INGESTION_QUEUE_HIGH_WATERMARK_PERCENT
              value: {{ $.Values.ingestion.queueHighWatermarkPercent | quote }}
            - name: INGESTION_MAX_BATCH_RECORDS
              value: {{ $.Values.ingestion.maxBatchRecords | quote }}
            - name: INGESTION_MAX_BATCH_BYTES
              value: {{ $.Values.ingestion.maxBatchBytes | quote }}
            - name: INGESTION_BACKPRESSURE_DELAY
              value: {{ $.Values.ingestion.backpressureDelay | quote }}
            - name: INGESTION_HEARTBEAT_INTERVAL
              value: {{ $.Values.ingestion.heartbeatInterval | quote }}
            - name: INGESTION_PERSISTENCE_BATCH_SIZE
              value: {{ $.Values.ingestion.persistenceBatchSize | quote }}
            - name: INGESTION_PERSISTENCE_RETRY_INITIAL
              value: {{ $.Values.ingestion.persistenceRetryInitial | quote }}
            - name: INGESTION_PERSISTENCE_RETRY_MAXIMUM
              value: {{ $.Values.ingestion.persistenceRetryMaximum | quote }}
            {{ if $.Values.ingestion.rawArchive.enabled }}
            - name: INGESTION_RAW_ARCHIVE_DIR
              value: {{ $.Values.ingestion.rawArchive.mountPath | quote }}
            {{ end }}
            {{ if $.Values.ingestion.sequenceCheckpoint.enabled }}
            - name: INGESTION_SEQUENCE_CHECKPOINT_DIR
              value: {{ $.Values.ingestion.sequenceCheckpoint.mountPath | quote }}
            {{ end }}
            - name: CLICKHOUSE_ADDRESS
              value: {{ $.Values.ingestion.clickhouse.address | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ $.Values.ingestion.clickhouse.database | quote }}
            - name: CLICKHOUSE_USERNAME
              value: {{ $.Values.ingestion.clickhouse.username | quote }}
            - name: CLICKHOUSE_PASSWORD
              value: {{ $.Values.ingestion.clickhouse.password | quote }}
            - name: CLICKHOUSE_SECURE
              value: {{ $.Values.ingestion.clickhouse.secure | quote }}
            {{ end }}
          {{ if and (eq .name "ingestion") (or (not $.Values.ingestion.insecure) $.Values.ingestion.rawArchive.enabled $.Values.ingestion.sequenceCheckpoint.enabled) }}
          volumeMounts:
            {{ if not $.Values.ingestion.insecure }}
            - name: ingestion-tls
              mountPath: /etc/kube-cost/tls
              readOnly: true
            {{ end }}
            {{ if $.Values.ingestion.rawArchive.enabled }}
            - name: ingestion-raw-archive
              mountPath: {{ $.Values.ingestion.rawArchive.mountPath | quote }}
            {{ end }}
            {{ if $.Values.ingestion.sequenceCheckpoint.enabled }}
            - name: ingestion-sequence-checkpoint
              mountPath: {{ $.Values.ingestion.sequenceCheckpoint.mountPath | quote }}
            {{ end }}
          {{ end }}
          {{ if eq .name "ingestion" }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          {{ else if or (eq .name "gateway") (eq .name "allocation") (eq .name "cluster-registry") (eq .name "pricing") (eq .name "query") (eq .name "workflow") }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          {{ else if and (eq .name "integrations") $.Values.integrations.karpenter.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          {{ else }}
          livenessProbe:
            grpc:
              port: 8080
          readinessProbe:
            grpc:
              port: 8080
          {{ end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      {{ if and (eq .name "ingestion") (or (not $.Values.ingestion.insecure) $.Values.ingestion.rawArchive.enabled $.Values.ingestion.sequenceCheckpoint.enabled) }}
      volumes:
        {{ if not $.Values.ingestion.insecure }}
        - name: ingestion-tls
          secret:
            secretName: {{ required "ingestion.tlsSecretName is required when mTLS is enabled" $.Values.ingestion.tlsSecretName }}
        {{ end }}
        {{ if $.Values.ingestion.rawArchive.enabled }}
        - name: ingestion-raw-archive
          emptyDir: {}
        {{ end }}
        {{ if $.Values.ingestion.sequenceCheckpoint.enabled }}
        - name: ingestion-sequence-checkpoint
          emptyDir: {}
        {{ end }}
      {{ end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $componentName }}
spec:
  selector:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    {{ if or (eq .name "gateway") (eq .name "allocation") (eq .name "cluster-registry") (eq .name "pricing") (eq .name "query") (eq .name "workflow") (and (eq .name "integrations") $.Values.integrations.karpenter.enabled) }}
    - name: http
      port: 8080
      targetPort: http
    {{ else }}
    - name: grpc
      port: 8080
      targetPort: grpc
    {{ end }}
{{- end }}
