{{- range .Values.components }}
{{- $componentName := printf "%s-%s" $.Release.Name .name | trunc 63 | trimSuffix "-" }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $componentName }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/part-of: kube-cost
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/part-of: kube-cost
    spec:
      serviceAccountName: {{ include "kube-cost-platform.name" $ }}
      securityContext:
        runAsNonRoot: true
      containers:
        - name: {{ .name }}
          image: {{ .image | quote }}
          imagePullPolicy: {{ $.Values.imagePullPolicy }}
          ports:
            - name: grpc
              containerPort: 8080
          env:
            - name: GRPC_ADDRESS
              value: ":8080"
          livenessProbe:
            grpc:
              port: 8080
          readinessProbe:
            grpc:
              port: 8080
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $componentName }}
spec:
  selector:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
{{- end }}
