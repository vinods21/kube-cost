imagePullPolicy: IfNotPresent

components:
  - name: gateway
    image: kube-cost/gateway:dev
    replicas: 1
  - name: identity
    image: kube-cost/identity:dev
    replicas: 1
  - name: tenant
    image: kube-cost/tenant:dev
    replicas: 1
  - name: cluster-registry
    image: kube-cost/cluster-registry:dev
    replicas: 1
  - name: policy
    image: kube-cost/policy:dev
    replicas: 1
  - name: integrations
    image: kube-cost/integrations:dev
    replicas: 1
  - name: pricing
    image: kube-cost/pricing:dev
    replicas: 1
  - name: ingestion
    image: kube-cost/ingestion:dev
    replicas: 1
  - name: allocation
    image: kube-cost/allocation:dev
    replicas: 1
  - name: recommendations
    image: kube-cost/recommendations:dev
    replicas: 1
  - name: query
    image: kube-cost/query:dev
    replicas: 1
  - name: workflow
    image: kube-cost/workflow:dev
    replicas: 1
  - name: export
    image: kube-cost/export:dev
    replicas: 1
  - name: audit
    image: kube-cost/audit:dev
    replicas: 1

podDisruptionBudget:
  enabled: false
  minAvailable: 1

topologySpread:
  enabled: false
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway

priorityClassName: ""

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""

gateway:
  tokenTenants: "dev-token:dev-tenant"
  queryURL: ""
  clusterRegistryURL: ""
  pricingURL: ""
  workflowURL: ""

ingestion:
  insecure: false
  tlsSecretName: kube-cost-ingestion-tls
  queueCapacity: 1000
  queueHighWatermarkPercent: 80
  maxBatchRecords: 500
  maxBatchBytes: 4194304
  backpressureDelay: 1s
  heartbeatInterval: 30s
  persistenceBatchSize: 20
  persistenceRetryInitial: 1s
  persistenceRetryMaximum: 30s
  rawArchive:
    enabled: false
    mountPath: /var/lib/kube-cost/raw-archive
  sequenceCheckpoint:
    enabled: false
    mountPath: /var/lib/kube-cost/sequence-checkpoints
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

allocation:
  nodeHourlyCostUSD: "0.10"
  controlPlaneHourlyCostUSD: "0.05"
  networkCostPerGiBUSD: "0.01"
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

query:
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

pricing:
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

workflow:
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

integrations:
  karpenter:
    enabled: false
    httpAddress: ":8080"
    clusterId: ""

operators:
  - name: platform-operator
    image: kube-cost/platform-operator:dev
  - name: action-executor
    image: kube-cost/action-executor:dev

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi
