imagePullPolicy: IfNotPresent

components:
  - name: gateway
    image: kube-cost/gateway:dev
  - name: identity
    image: kube-cost/identity:dev
  - name: tenant
    image: kube-cost/tenant:dev
  - name: cluster-registry
    image: kube-cost/cluster-registry:dev
  - name: policy
    image: kube-cost/policy:dev
  - name: integrations
    image: kube-cost/integrations:dev
  - name: pricing
    image: kube-cost/pricing:dev
  - name: ingestion
    image: kube-cost/ingestion:dev
  - name: allocation
    image: kube-cost/allocation:dev
  - name: recommendations
    image: kube-cost/recommendations:dev
  - name: query
    image: kube-cost/query:dev
  - name: workflow
    image: kube-cost/workflow:dev
  - name: export
    image: kube-cost/export:dev
  - name: audit
    image: kube-cost/audit:dev

ingestion:
  insecure: false
  tlsSecretName: kube-cost-ingestion-tls
  queueCapacity: 1000
  queueHighWatermarkPercent: 80
  maxBatchRecords: 500
  maxBatchBytes: 4194304
  backpressureDelay: 1s
  heartbeatInterval: 30s
  persistenceBatchSize: 20
  persistenceRetryInitial: 1s
  persistenceRetryMaximum: 30s
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

allocation:
  nodeHourlyCostUSD: "0.10"
  controlPlaneHourlyCostUSD: "0.05"
  networkCostPerGiBUSD: "0.01"
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

query:
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

workflow:
  clickhouse:
    address: clickhouse:9000
    database: kube_cost
    username: kube_cost
    password: kube_cost
    secure: false

integrations:
  karpenter:
    enabled: false
    httpAddress: ":8080"
    clusterId: ""

operators:
  - name: platform-operator
    image: kube-cost/platform-operator:dev
  - name: action-executor
    image: kube-cost/action-executor:dev

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi
