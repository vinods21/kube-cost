name: kube-cost

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    environment:
      CLICKHOUSE_DB: kube_cost
      CLICKHOUSE_USER: kube_cost
      CLICKHOUSE_PASSWORD: kube_cost
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: kube_cost
      POSTGRES_USER: kube_cost
      POSTGRES_PASSWORD: kube_cost
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kube_cost"]
      interval: 5s
      timeout: 3s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v25.2.1
    command:
      - redpanda
      - start
      - --mode
      - dev-container
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --kafka-addr
      - 0.0.0.0:9092
      - --advertise-kafka-addr
      - redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    profiles: ["platform"]
    build:
      context: ../..
      dockerfile: build/Dockerfile
      args:
        TARGET: ./services/gateway
    environment:
      GRPC_ADDRESS: :8080
    ports:
      - "8080:8080"

  ingestion:
    profiles: ["platform"]
    build:
      context: ../..
      dockerfile: build/Dockerfile
      args:
        TARGET: ./services/ingestion
    environment:
      GRPC_ADDRESS: :8080
    ports:
      - "8082:8080"

  query:
    profiles: ["platform"]
    build:
      context: ../..
      dockerfile: build/Dockerfile
      args:
        TARGET: ./services/query
    environment:
      GRPC_ADDRESS: :8080
    ports:
      - "8083:8080"

volumes:
  clickhouse-data:
  postgres-data:
